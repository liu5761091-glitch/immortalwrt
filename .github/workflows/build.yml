name: Build AX6000
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt update && sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
      - name: Write config
        run: |
          cat > .config << 'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_redmi_ax6000=y
CONFIG_TARGET_KERNEL_PARTSIZE=128
CONFIG_TARGET_ROOTFS_PARTSIZE=384
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-dockerman=y
EOF
      - name: Update feeds
        run: ./scripts/feeds update -a && ./scripts/feeds install -a
      - name: Make defconfig
        run: make defconfig
      - name: Download
        run: make download -j16
      - name: Build
        run: make -j$(nproc) || make -j1 V=s
      - uses: actions/upload-artifact@v4
        with:
          name: ax6000-firmware
          path: bin/targets/mediatek/filogic/*.itb
